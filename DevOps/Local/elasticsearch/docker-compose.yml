# ═══════════════════════════════════════════════
# Elasticsearch 8.x + Kibana
# 
# WHY: Core search + analytics engine for DealerPulse agents.
# Kibana gives you the Agent Builder UI + Dev Tools console.
#
# PORTS:
#   9200 → Elasticsearch API (agents query this)
#   5601 → Kibana UI (you open this in browser)
#
# KEY DECISIONS:
#   - Security disabled for local dev (xpack.security.enabled=false)
#     In production you'd enable TLS + API keys
#   - Single node mode (no cluster overhead for local dev)
#   - 1GB heap — increase if you're indexing millions of docs
# ═══════════════════════════════════════════════

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ES_VERSION:-8.17.0}
    container_name: dealerpulse-es
    environment:
      # Single node = no cluster discovery overhead
      - discovery.type=single-node
      # Disable security for local dev (no TLS, no passwords)
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      # JVM heap: 1GB min and max (prevents heap resizing pauses)
      - ES_JAVA_OPTS=${ES_JAVA_OPTS:--Xms1g -Xmx1g}
      - cluster.name=dealerpulse
      # Lock memory to prevent ES from swapping to disk (kills performance)
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "${ES_PORT:-9200}:9200"
    volumes:
      # Named volume = data survives container restarts
      # Destroyed only by docker-all-destroy.sh
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - dealerpulse-net

  kibana:
    image: docker.elastic.co/kibana/kibana:${ES_VERSION:-8.17.0}
    container_name: dealerpulse-kibana
    environment:
      # Points to ES by container name (works because same network)
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    depends_on:
      elasticsearch:
        # Wait for ES to be healthy before starting Kibana
        condition: service_healthy
    networks:
      - dealerpulse-net

volumes:
  es_data:

# Join the shared network so other services can reach ES
networks:
  dealerpulse-net:
    external: true
