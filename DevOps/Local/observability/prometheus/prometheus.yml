# ═══════════════════════════════════════════════
# Prometheus — Scrape Configuration
#
# HOW IT WORKS: Prometheus visits each target URL every 15 seconds,
# pulls metrics in Prometheus format, and stores them as time-series.
# Grafana then queries Prometheus to build dashboards.
#
# Each job below scrapes a different service.
# Services that aren't running will just show as "down" — no errors.
# ═══════════════════════════════════════════════

global:
  scrape_interval: 15s      # How often to pull metrics
  evaluation_interval: 15s  # How often to evaluate alert rules

scrape_configs:
  # Prometheus scrapes itself (meta!)
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Elasticsearch metrics
  # ES exposes metrics at /_prometheus/metrics (if plugin installed)
  # or you can use the built-in /_cluster/stats endpoint
  - job_name: "elasticsearch"
    metrics_path: "/_prometheus/metrics"
    static_configs:
      - targets: ["elasticsearch:9200"]

  # OpenTelemetry Collector internal metrics
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8888"]

  # Grafana internal metrics
  - job_name: "grafana"
    static_configs:
      - targets: ["grafana:3000"]

  # Add more as needed:
  # - Kafka: use kafka-exporter sidecar
  # - PostgreSQL: use postgres-exporter sidecar
  # - Milvus: exposes metrics at :9091/metrics
