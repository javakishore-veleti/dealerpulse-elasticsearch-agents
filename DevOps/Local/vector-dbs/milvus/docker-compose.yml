# ═══════════════════════════════════════════════
# Milvus — Distributed Vector Database
#
# WHY: Enterprise-scale vector DB. Handles billions of vectors with
# GPU acceleration. Used by major companies for production RAG.
#
# COMPLEXITY: Milvus needs 3 containers (vs 1 for Qdrant/ChromaDB):
#   - etcd: metadata storage (tracks collections, partitions, segments)
#   - minio: object storage (stores the actual vector data files)
#   - milvus: the vector engine itself
# This is "standalone" mode. Production uses distributed mode with
# separate query/data/index nodes.
#
# PORTS:
#   19530 → Milvus gRPC API (Python SDK connects here)
# ═══════════════════════════════════════════════

services:
  # etcd — Milvus stores its metadata (collection schemas, partitions) here
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: dealerpulse-milvus-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"  # 4GB
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
        -advertise-client-urls=http://127.0.0.1:2379
        -listen-client-urls=http://0.0.0.0:2379
        --data-dir=/etcd
    volumes:
      - milvus_etcd:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dealerpulse-net

  # MinIO — Milvus stores vector data files (segments) here as objects
  milvus-minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: dealerpulse-milvus-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - milvus_minio:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dealerpulse-net

  # Milvus standalone — the vector engine
  milvus:
    image: milvusdb/milvus:v2.5.4
    container_name: dealerpulse-milvus
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    command: ["milvus", "run", "standalone"]
    ports:
      - "${MILVUS_PORT:-19530}:19530"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      milvus-etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9091/healthz || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
    networks:
      - dealerpulse-net

volumes:
  milvus_etcd:
  milvus_minio:
  milvus_data:

networks:
  dealerpulse-net:
    external: true
