# ═══════════════════════════════════════════════
# nginx — serves Angular + proxies API to Python backend
#
# In cloud deployment, the BACKEND_URL env var should point to
# your Python FastAPI service (e.g., an internal ALB or Cloud Run URL).
# For local Docker: http://dealerpulse-app:8000
# ═══════════════════════════════════════════════

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Angular SPA — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api requests to the Python FastAPI backend
    # Override BACKEND_URL via env var in your cloud deploy
    location /api/ {
        proxy_pass http://localhost:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;  # Agent calls can take time
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
